[project]
name = "api-app-nexus-ai"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "agno[async-postgres,postgres]>=2.3.21",
    "alembic>=1.13.0",
    "aiosqlite>=0.22.1",
    "anyio>=4.0.0",
    "claude-agent-sdk>=0.1.72,<0.2",
    "fastapi-users[sqlalchemy]>=15.0.3",
    "fastapi[standard]>=0.127.0",
    "google-genai>=1.56.0",
    "mcp>=1.25.0",
    "psycopg>=3.3.3",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "python-dotenv>=1.2.1",
    "sqlalchemy-utils>=0.42.1",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.14.0",
    "mypy>=1.18.0",
]

# --- ruff: linter + formatter ----------------------------------------------
# Replaces black, isort, flake8, pyupgrade. Config aligned with the project's
# clean-code rules (type hints, docstrings on exports, no magic numbers, etc).
[tool.ruff]
target-version = "py313"
line-length = 100
extend-exclude = [
    ".venv",
    "alembic/versions",  # auto-generated migrations
    "workspaces",        # ephemeral runtime data
]

[tool.ruff.lint]
# Selected rule families:
#   E, W   = pycodestyle errors/warnings
#   F      = pyflakes (unused imports, undefined names)
#   I      = isort (import sorting)
#   B      = flake8-bugbear (real bugs: mutable default args, etc.)
#   UP     = pyupgrade (modernize syntax for target Python)
#   SIM    = flake8-simplify
#   ASYNC  = flake8-async (async/await footguns)
#   PL     = pylint (subset)
#   RUF    = ruff-specific
#   D      = pydocstyle (docstrings on public API — matches project rule)
select = ["E", "W", "F", "I", "B", "UP", "SIM", "ASYNC", "PL", "RUF", "D"]
ignore = [
    "E501",     # line length — handled by formatter, soft cap only
    "D100",     # missing module docstring (too noisy on small modules)
    "D104",     # missing docstring in __init__.py
    "D107",     # missing docstring in __init__ method (covered by class docstring)
    "D203",     # incompatible with D211 (no blank line before class)
    "D213",     # incompatible with D212 (multi-line summary on first line)
    "PLR0913",  # too many args — FastAPI handlers regularly need many deps
    "B008",     # function call in default arg — required for FastAPI Depends()
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D", "PLR2004"]      # tests don't need docstrings or named magic numbers
"tests/conftest.py" = ["D", "E402"] # sys.path manipulation must come before imports
"alembic/**" = ["D", "E", "I"]     # migrations are auto-generated

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

# --- mypy: static type checker ---------------------------------------------
# Strict-ish defaults. Project rule forbids cast(Any, ...), so we want mypy
# to surface real type holes rather than letting them slip through.
[tool.mypy]
python_version = "3.13"
strict = true
# Targeted relaxations — strict mode is too loud against FastAPI/SQLAlchemy
# ecosystems where many third-party annotations are still incomplete.
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_decorators = false  # FastAPI/pytest decorators trip this
# Required because ``app.models`` and ``app.api.models`` both end with ``models.py``
# — without explicit package bases, mypy can't disambiguate them.
explicit_package_bases = true
mypy_path = "."
plugins = ["pydantic.mypy"]
exclude = ["alembic/versions/", "workspaces/", ".venv/"]
files = ["app", "tests", "main.py"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false  # test fixtures are fine without explicit types

[[tool.mypy.overrides]]
# Third-party packages without complete type stubs.
module = ["sqlalchemy_utils.*", "agno.*", "mcp.*"]
ignore_missing_imports = true
