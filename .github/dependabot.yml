# Dependabot configuration
# Adapted from OpenClaw for AI Nexus

version: 2

updates:
  # npm dependencies (root & workspaces like frontend)
  - package-ecosystem: npm
    directory: /
    target-branch: "development"
    rebase-strategy: "auto"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      production:
        dependency-type: production
      development:
        dependency-type: development
    open-pull-requests-limit: 10

  # Python backend (pyproject.toml)
  - package-ecosystem: pip
    directory: /backend
    target-branch: "development"
    rebase-strategy: "auto"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-deps:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    target-branch: "development"
    rebase-strategy: "auto"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
