name: Sentrux Architecture Check

on:
  pull_request:
    branches: [development, main]
  push:
    branches: [development, main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sentrux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: sentrux check
    # OctavianTocan-only gate: skip for any other author and any fork PR.
    # Push events have no pull_request payload, so the second clause is
    # vacuously true and the workflow still runs on direct pushes.
    if: >-
      github.actor == 'OctavianTocan' &&
      (github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache sentrux binary
        id: cache-sentrux
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/sentrux
          key: sentrux-${{ runner.os }}-v0.5.7

      - name: Install sentrux
        if: steps.cache-sentrux.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://raw.githubusercontent.com/sentrux/sentrux/main/install.sh | sh
          # The installer drops it on PATH; mirror to the cache path too.
          if [ ! -x ~/.local/bin/sentrux ]; then
            cp "$(command -v sentrux)" ~/.local/bin/sentrux
          fi

      - name: Add sentrux to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run sentrux check
        id: check
        run: |
          set +e
          bash scripts/sentrux-check.sh | tee sentrux-output.txt
          status=${PIPESTATUS[0]}
          {
            echo 'output<<EOF'
            cat sentrux-output.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          SENTRUX_OUTPUT: ${{ steps.check.outputs.output }}
        with:
          script: |
            const output = process.env.SENTRUX_OUTPUT || '';
            const body = [
              '### sentrux architectural check failed',
              '',
              'Architectural rules in `.sentrux/rules.toml` were violated by this PR. Either fix the violations, or update the rules with reviewer agreement.',
              '',
              '<details><summary>sentrux output</summary>',
              '',
              '```',
              output.slice(-6000),
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
