name: Auto-rebase PRs

on:
  push:
    branches:
      - development
  # pull_request_target is used deliberately: this workflow never executes
  # code from the PR branch, so the elevated base-branch token is safe.
  pull_request_target:
    types: [labeled]
    branches:
      - development
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: read

# Prevent race conditions if multiple triggers fire for the same PR simultaneously
concurrency:
  group: rebase-pr-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  get-prs:
    name: Find Open PRs
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.set-prs.outputs.prs }}
    # Guard: Only run if the base branch is exactly 'development' (for PR events), and check the specific trigger conditions.
    if: >-
      (github.event_name == 'push') ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.base.ref == 'development' && github.event.label.name == 'auto-rebase') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/rebase') && contains(fromJson('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association))
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0

      - name: Get PR list
        id: set-prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            if [[ -z "$ISSUE_NUMBER" ]]; then
              echo "No issue number found, skipping." && exit 1
            fi
            echo "prs=[$ISSUE_NUMBER]" >> $GITHUB_OUTPUT
          elif [[ "$EVENT_NAME" == "pull_request_target" ]]; then
            if [[ -z "$PR_NUMBER" ]]; then
              echo "No PR number found, skipping." && exit 1
            fi
            echo "prs=[$PR_NUMBER]" >> $GITHUB_OUTPUT
          else
            # Note: PRs MUST have the "auto-rebase" label applied to be included here.
            # This prevents the bot from force-pushing over active work.
            PRS=$(gh pr list --base development --state open --search "label:auto-rebase" --json number -q '[.[] | .number]')
            echo "prs=$PRS" >> $GITHUB_OUTPUT
          fi

  rebase:
    name: Rebase PR #${{ matrix.pr }}
    needs: get-prs
    if: ${{ needs.get-prs.outputs.prs != '[]' && needs.get-prs.outputs.prs != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.get-prs.outputs.prs) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Attempt Rebase
        id: rebase
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ matrix.pr }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH_NAME=$(gh pr view $PR_NUMBER --json headRefName -q .headRefName)
          if [[ -z "$BRANCH_NAME" ]]; then
            echo "Failed to fetch branch name for PR $PR_NUMBER"
            exit 1
          fi
          
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          git fetch origin "$BRANCH_NAME"
          git checkout "$BRANCH_NAME"
          
          if git rebase origin/development; then
            echo "Clean rebase successful. Force pushing..."
            git push origin "$BRANCH_NAME" --force-with-lease
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            echo "Merge conflict detected! Preparing for Claude Code autonomous resolution..."
            echo "conflict=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies (just, bun, uv)
        if: steps.rebase.outputs.conflict == 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin
          npm install -g bun
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          just install

      - name: Resolve conflicts with Claude Code
        if: steps.rebase.outputs.conflict == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            This repository is currently in the middle of a git rebase with merge conflicts.
            Find all files with conflict markers (<<<<<<<).
            Intelligently resolve the conflicts to preserve the intent of both branches.
            Once resolved, use the Bash tool to run `git add -u` and `git rebase --continue`.
            Ensure the rebase completes successfully. Do NOT push the branch yourself, just finish the rebase.
          claude_args: '--accept-all --allowed-tools "Edit,Read,Write,Glob,Grep,Bash(git status),Bash(git add -u),Bash(git rebase --continue)"'

      - name: Run Build and Lint Gates (just check)
        if: steps.rebase.outputs.conflict == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          just check
          cd frontend
          bun run typecheck

      - name: Verify and Push Rebased Branch
        if: steps.rebase.outputs.conflict == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ matrix.pr }}
          BRANCH_NAME: ${{ steps.rebase.outputs.branch }}
        run: |
          # After Claude finishes, check if we are still rebasing
          if test -d ".git/rebase-merge" || test -d ".git/rebase-apply"; then
            echo "Claude failed to complete the rebase. Aborting."
            git rebase --abort
            gh pr comment $PR_NUMBER --body "⚠️ **Automated Rebase Failed:** Claude Code attempted to resolve the merge conflicts but failed to complete the rebase. Manual intervention required."
            exit 1
          fi
          
          echo "Claude successfully resolved the conflicts and completed the rebase. Force pushing..."
          git push origin "$BRANCH_NAME" --force-with-lease
          gh pr comment $PR_NUMBER --body "🤖 **AI Resolved Conflicts:** Claude Code autonomously resolved the merge conflicts, verified typechecks/linting, and completed the rebase."
